name: Build and Publish Docker Image

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  issues: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event.release.target_commitish == 'main' || github.event.release.target_commitish == 'master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_API_TOKEN }}

      - name: Extract release tag
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/miniurl-ui:${{ steps.tag.outputs.TAG_NAME }}
            ${{ secrets.DOCKER_USER }}/miniurl-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify release creator
        uses: actions/github-script@v7
        with:
          script: |
            const release = context.payload.release;
            const creator = release.author?.login || 'unknown';
            const tagName = release.tag_name;
            const imageName = `${{ secrets.DOCKER_USER }}/miniurl-ui`;

            const commentBody = `🚀 **Release ${tagName}** has been built and published to Docker Hub!

            **Image:** \`${imageName}:${tagName}\`

            **Pull it:**
            \`\`\`bash
            docker pull ${imageName}:${tagName}
            \`\`\`

            **Run it:**
            \`\`\`bash
            docker run -d -p 80:80 \\
              -e VITE_API_URL=https://your-api.com \\
              --restart unless-stopped \\
              ${imageName}:${tagName}
            \`\`\`

            🔗 [View Release ${tagName}](${release.html_url})`;

            // Create an issue assigned to the release creator (triggers email notification)
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🐳 Docker image published for ${tagName}`,
              body: commentBody,
              labels: ['release', 'docker'],
              assignees: [creator]
            });

            console.log(`Created notification issue #${issue.data.number} and assigned to @${creator}`);
