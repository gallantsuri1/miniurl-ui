name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  issues: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG_NAME=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Verify branch is main or master
        run: |
          BRANCH=$(git branch -r --contains ${{ github.ref }} | grep -E 'origin/(main|master)' | head -1 || true)
          if [ -z "$BRANCH" ]; then
            echo "❌ Tag is not on main or master branch. Skipping."
            exit 1
          fi
          echo "✅ Tag is on $BRANCH"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_API_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/miniurl-ui:${{ steps.tag.outputs.TAG_NAME }}
            ${{ secrets.DOCKER_USER }}/miniurl-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create notification issue
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = '${{ steps.tag.outputs.TAG_NAME }}';
            const imageName = `${{ secrets.DOCKER_USER }}/miniurl-ui`;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            const commentBody = `🚀 **Release ${tagName}** has been built and published to Docker Hub!

            **Image:** \`${imageName}:${tagName}\`

            **Pull it:**
            \`\`\`bash
            docker pull ${imageName}:${tagName}
            \`\`\`

            **Run it:**
            \`\`\`bash
            docker run -d -p 80:80 \\
              -e VITE_API_URL=https://your-api.com \\
              --restart unless-stopped \\
              ${imageName}:${tagName}
            \`\`\`

            🔗 [View Build Log](${runUrl})`;

            // Create an issue assigned to the workflow triggerer
            const actor = process.env.GITHUB_ACTOR || 'unknown';
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🐳 Docker image published for ${tagName}`,
              body: commentBody,
              labels: ['release', 'docker'],
              assignees: [actor]
            });

            console.log(`Created notification issue #${issue.data.number} and assigned to @${actor}`);
